<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Far Cry 5 Random Loadout Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #facc15;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      background: #facc15;
      color: black;
      border: none;
      padding: 12px 20px;
      margin-top: 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #eab308;
    }

    .result {
      margin-top: 20px;
      text-align: left;
    }

    .card {
      background: #334155;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
    }

    .challenge {
      background: #7c2d12;
    }

    footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🎮 Far Cry 5 Loadout Generator</h1>
    <p>Genera un loadout casuale e prova la sfida!</p>

    <button onclick="generate()">🎲 Genera Loadout</button>

    <div id="result" class="result"></div>
  </div>

  <footer>
    Creato per contenuti gaming 🎥
  </footer>

  <script>
    const primaryWeapons = [
      "AK-47", "AR-C", "M60", "MP5", "SPAS-12",
      "Sniper Rifle", "Vector .45 ACP", "MS16"
    ];

    const secondaryWeapons = [
      "1911 Pistol", "Magnum .44", "SMG", "D2 Shotgun"
    ];

    const explosives = [
      "Molotov", "Grenade", "Proximity Mine", "Remote Explosive"
    ];

    const challenges = [
      "Solo headshot 🎯",
      "No HUD 👁️",
      "Solo stealth 🕶️",
      "No healing 🚫",
      "Solo corpo a corpo 🪓",
      "Devi correre sempre 🏃",
      "Niente mira (hip fire only) 🔫"
    ];

    function getRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generate() {
      const resultHTML = `
        <div class="card"><strong>🔫 Primaria:</strong> ${getRandom(primaryWeapons)}</div>
        <div class="card"><strong>🔫 Secondaria:</strong> ${getRandom(secondaryWeapons)}</div>
        <div class="card"><strong>💣 Esplosivo:</strong> ${getRandom(explosives)}</div>
        <div class="card challenge"><strong>🔥 Challenge:</strong> ${getRandom(challenges)}</div>
      `;

      document.getElementById("result").innerHTML = resultHTML;
    }
  </script>

</body>
</html>
